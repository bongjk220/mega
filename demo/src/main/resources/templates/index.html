<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEGABOX</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden;
        }
        
        .header {
            background: linear-gradient(180deg, #1a1a1a 0%, #000 100%);
            padding: 20px 0;
            border-bottom: 1px solid #333;
        }
        
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        .logo {
            font-size: 32px;
            font-weight: bold;
            color: #e50914;
            margin-bottom: 20px;
        }
        
        .tabs {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }
        
        .tab {
            color: #999;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            padding: 8px 0;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }
        
        .tab.active {
            color: #fff;
            border-bottom-color: #e50914;
        }
        
        .tab:hover {
            color: #fff;
        }
        
        .search-container {
            position: relative;
            max-width: 400px;
        }
        
        .search-input {
            width: 100%;
            padding: 12px 45px 12px 20px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 25px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .search-input:focus {
            border-color: #e50914;
        }
        
        .search-input::placeholder {
            color: #666;
        }
        
        .search-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
        }
        
        .content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .section-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 30px;
            color: #fff;
        }
        
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            margin-bottom: 60px;
        }
        
        .movie-card {
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        
        .movie-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(229, 9, 20, 0.3);
        }
        
        .movie-poster {
            width: 100%;
            height: 280px;
            background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 14px;
            position: relative;
            overflow: hidden;
        }
        
        .movie-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .movie-info {
            padding: 15px;
        }
        
        .movie-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #fff;
            line-height: 1.3;
            height: 39px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        
        .movie-meta {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .meta-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: #999;
        }
        
        .booking-rate {
            color: #e50914;
            font-weight: 600;
        }
        
        .release-date {
            color: #aaa;
        }
        
        .movie-poster {
            position: relative;
        }
        
        .movie-synopsis {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 15px;
            font-size: 12px;
            line-height: 1.4;
            overflow-y: auto;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .movie-poster:hover .movie-synopsis {
            opacity: 1;
            visibility: visible;
        }
        
        .no-movies {
            text-align: center;
            color: #666;
            padding: 60px 20px;
            font-size: 16px;
        }
        
        @media (max-width: 768px) {
            .movie-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 15px;
            }
            
            .movie-poster {
                height: 220px;
            }
            
            .tabs {
                gap: 20px;
                overflow-x: auto;
            }
            
            .tab {
                white-space: nowrap;
            }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="nav-container">
        <div class="logo">박스오피스</div>
    </div>
</header>

<main class="content">
    <section>
        <h2 class="section-title">전체영화</h2>
        
        <div class="movie-grid" th:if="${not #lists.isEmpty(movies)}">
            <div th:each="m : ${movies}" class="movie-card">
                <div class="movie-poster">
                    <img th:if="${m.imgPathNm != null and !#strings.isEmpty(m.imgPathNm)}" th:src="${#strings.startsWith(m.imgPathNm, 'http') ? m.imgPathNm : 'https://www.megabox.co.kr' + m.imgPathNm}" th:alt="${m.movieNm}" onerror="this.style.display='none'; this.parentElement.innerHTML='이미지 로딩 실패'">
                    <span th:unless="${m.imgPathNm != null and !#strings.isEmpty(m.imgPathNm)}">이미지 로딩 실패</span>
                    <div class="movie-synopsis" th:if="${m.movieSynopCn != null and !#strings.isEmpty(m.movieSynopCn)}" th:text="${m.movieSynopCn}">
                        영화 줄거리 정보가 없습니다.
                    </div>
                </div>
                
                <div class="movie-info">
                    <h3 class="movie-title" th:text="${m.movieNm}">영화 제목</h3>
                    
                    <div class="movie-meta">
                        <div class="meta-item">
                            <span>랭킹</span>
                            <span class="booking-rate" th:text="${m.boxoRank} + '위'">1위</span>
                        </div>
                        <div class="meta-item">
                            <span>개봉일</span>
                            <span class="release-date" th:text="${m.rfilmDe}">2024.04.23</span>
                        </div>
                        <div class="meta-item">
                            <span th:text="${m.admisClassNm}">12세</span>
                            <span th:text="${m.movieStatNm}">미개봉</span>
                        </div>
                        <div class="meta-item">
                            <span>상영시간</span>
                            <span th:text="${m.playTime} + '분'"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div th:if="${#lists.isEmpty(movies)}" class="no-movies">
            현재 상영중인 영화가 없습니다.
        </div>
    </section>
</main>

</body>
</html>
