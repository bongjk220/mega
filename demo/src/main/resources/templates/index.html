<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>박스오피스</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="header">
    <div class="nav-container">
        <div class="logo">박스오피스</div>
    </div>
</header>

<main class="content">
    <section>
        <h2 class="section-title">전체영화</h2>
        
        <div class="movie-grid" th:if="${not #lists.isEmpty(movies)}">
            <div th:each="m : ${movies}" class="movie-card">
                <div class="movie-poster">
                    <img th:if="${m.imgPathNm != null and !#strings.isEmpty(m.imgPathNm)}" th:src="${#strings.startsWith(m.imgPathNm, 'http') ? m.imgPathNm : 'https://www.megabox.co.kr' + m.imgPathNm}" th:alt="${m.movieNm}" onerror="this.style.display='none'; this.parentElement.innerHTML='이미지 로딩 실패'">
                    <span th:unless="${m.imgPathNm != null and !#strings.isEmpty(m.imgPathNm)}">이미지 로딩 실패</span>
                    <div class="movie-synopsis" th:if="${m.movieSynopCn != null and !#strings.isEmpty(m.movieSynopCn)}" th:text="${m.movieSynopCn}">
                        영화 줄거리 정보가 없습니다.
                    </div>
                </div>
                
                <div class="movie-info">
                    <h3 class="movie-title" th:text="${m.movieNm}">영화 제목</h3>
                    
                    <div class="movie-meta">
                        <div class="meta-item">
                            <span>랭킹</span>
                            <span class="booking-rate" th:text="${m.boxoRank} + '위'">1위</span>
                        </div>
                        <div class="meta-item">
                            <span>개봉일</span>
                            <span class="release-date" th:text="${m.rfilmDe}">2024.04.23</span>
                        </div>
                        <div class="meta-item">
                            <span th:text="${m.admisClassNm}">12세</span>
                            <span th:text="${m.movieStatNm}">미개봉</span>
                        </div>
                        <div class="meta-item">
                            <span>상영시간</span>
                            <span th:text="${m.playTime} + '분'"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div th:if="${#lists.isEmpty(movies)}" class="no-movies">
            현재 상영중인 영화가 없습니다.
        </div>
    </section>
</main>

</body>
</html>
