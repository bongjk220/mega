<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Movie Ranking</title>
    <style>
        body { background:#111; color:#fff; font-family:sans-serif; }
        .card {
            background:#222;
            margin:10px;
            padding:15px;
            border-radius:10px;
        }
    </style>
</head>
<body>

<h1>🎬 영화 순위</h1>

<div th:each="m : ${movies}" class="card">
    <div>#<span th:text="${m.boxoRank}"></span></div>
    <h3 th:text="${m.movieNm}"></h3>
    <div th:text="${m.rfilmDe}"></div>
    <div th:text="${m.movieStatNm}"></div>
    <div th:text="${m.admisClassNm}"></div>
    <div th:text="${m.imgPathNm}"></div>
    <div th:text="${m.movieSynopCn}"></div>
    <div th:text="${m.playTime}"></div>
</div>

</body>
</html>
