spring.application.name=demo

# Character encoding for Korean support - Enhanced for Render.com
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.servlet.encoding.force-request=true
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true
spring.http.encoding.force-request=true

# Additional encoding settings
spring.messages.encoding=UTF-8
spring.thymeleaf.mode=HTML
spring.thymeleaf.servlet.content-type=text/html;charset=UTF-8

# Logging encoding for Korean characters in console
logging.charset.console=UTF-8
logging.file.encoding=UTF-8

# JVM encoding settings for Windows
spring.jmx.default-domain=UTF-8
spring.output.ansi.enabled=always

# Force UTF-8 encoding for all operations
spring.banner.charset=UTF-8

# TiDB Cloud settings with environment variables support
spring.datasource.url=${DATABASE_URL:jdbc:mysql://gateway01.ap-northeast-1.prod.aws.tidbcloud.com:4000/mydb?useSSL=true&verifyServerCertificate=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
spring.datasource.username=${DATABASE_USERNAME:PrkazshsERPiVWq.root}
spring.datasource.password=${DATABASE_PASSWORD:iQcYuElTAhN3wGD5}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection settings for TiDB Cloud
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.ssl-mode=REQUIRED

# JPA/Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# Server port (Render uses PORT environment variable)
server.port=${PORT:8080}